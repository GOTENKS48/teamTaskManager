<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Dashboard — View your projects, tasks, and team progress at a glance.">
  <title>Dashboard — TaskFlow</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app-container">
    <!-- Navbar -->
    <nav class="navbar">
      <a href="/dashboard.html" class="navbar-brand"><span class="icon">📋</span> TaskFlow</a>
      <div class="navbar-actions">
        <div class="navbar-user">
          <div class="user-avatar" id="navbar-user-avatar">?</div>
          <span id="navbar-user-name">User</span>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="logout()">Logout</button>
      </div>
    </nav>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Page Header -->
      <div class="section-header" style="margin-bottom:1.5rem">
        <h1>Dashboard</h1>
        <button class="btn btn-primary" onclick="openModal('create-project-modal')">+ New Project</button>
      </div>

      <!-- Stats -->
      <div class="stats-grid" id="stats-grid">
        <div class="stat-card"><div class="skeleton skeleton-card"></div></div>
        <div class="stat-card"><div class="skeleton skeleton-card"></div></div>
        <div class="stat-card"><div class="skeleton skeleton-card"></div></div>
        <div class="stat-card"><div class="skeleton skeleton-card"></div></div>
      </div>

      <!-- Overdue Tasks -->
      <div class="card" style="margin-bottom:1.5rem">
        <div class="card-header">
          <h3>⚠️ Overdue Tasks</h3>
        </div>
        <div id="overdue-list"><div class="skeleton skeleton-text" style="width:80%"></div><div class="skeleton skeleton-text" style="width:60%"></div></div>
      </div>

      <!-- Recent Activity -->
      <div class="card" style="margin-bottom:1.5rem">
        <div class="card-header">
          <h3>🕐 Recent Activity</h3>
        </div>
        <div id="recent-list"><div class="skeleton skeleton-text" style="width:80%"></div><div class="skeleton skeleton-text" style="width:60%"></div></div>
      </div>

      <!-- Projects -->
      <div class="section-header"><h2>Your Projects</h2></div>
      <div class="projects-grid" id="projects-grid">
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
      </div>
    </div>
  </div>

  <!-- Create Project Modal -->
  <div class="modal-overlay" id="create-project-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">Create New Project</h3>
        <button class="modal-close" onclick="closeModal('create-project-modal')">&times;</button>
      </div>
      <form id="create-project-form">
        <div class="form-group">
          <label class="form-label" for="new-project-name">Project Name</label>
          <input type="text" id="new-project-name" class="form-input" placeholder="My Awesome Project" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="new-project-desc">Description (optional)</label>
          <textarea id="new-project-desc" class="form-textarea" placeholder="What's this project about?"></textarea>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="closeModal('create-project-modal')">Cancel</button>
          <button type="submit" class="btn btn-primary">Create Project</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
