<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Team Task Manager — Manage projects, assign tasks, track progress with role-based access control.">
  <title>Team Task Manager — Sign In</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>📋 TaskFlow</h1>
        <p>Manage your team's work, together.</p>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" data-form="login-section" id="login-tab">Sign In</button>
        <button class="auth-tab" data-form="signup-section" id="signup-tab">Sign Up</button>
      </div>

      <!-- Login Form -->
      <div id="login-section" class="auth-form active">
        <form id="login-form">
          <div class="form-group">
            <label class="form-label" for="login-email">Email</label>
            <input type="email" id="login-email" class="form-input" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="login-password">Password</label>
            <input type="password" id="login-password" class="form-input" placeholder="••••••••" required minlength="6">
          </div>
          <div style="text-align:right;margin-bottom:0.75rem">
            <a href="#" id="show-forgot-link" style="font-size:0.8rem;color:var(--accent)">Forgot password?</a>
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;">Sign In</button>
        </form>
      </div>

      <!-- Signup Form -->
      <div id="signup-section" class="auth-form">
        <form id="signup-form">
          <div class="form-group">
            <label class="form-label" for="signup-name">Full Name</label>
            <input type="text" id="signup-name" class="form-input" placeholder="John Doe" required minlength="2">
          </div>
          <div class="form-group">
            <label class="form-label" for="signup-email">Email</label>
            <input type="email" id="signup-email" class="form-input" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="signup-password">Password</label>
            <input type="password" id="signup-password" class="form-input" placeholder="Min 6 characters" required minlength="6">
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%; margin-top:0.5rem;">Create Account</button>
        </form>
      </div>

      <!-- Forgot Password Form -->
      <div id="forgot-section" class="auth-form">
        <div style="text-align:center;margin-bottom:1.25rem">
          <div style="font-size:2.5rem;margin-bottom:0.5rem">🔒</div>
          <h3 style="margin-bottom:0.25rem">Forgot Password?</h3>
          <p class="text-muted" style="font-size:0.85rem">Enter your email and we'll send you a reset link.</p>
        </div>
        <form id="forgot-form">
          <div class="form-group">
            <label class="form-label" for="forgot-email">Email Address</label>
            <input type="email" id="forgot-email" class="form-input" placeholder="you@example.com" required>
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;">Send Reset Link</button>
          <div style="text-align:center;margin-top:1rem">
            <a href="#" id="back-to-login-1" style="font-size:0.85rem;color:var(--text-muted)">← Back to Sign In</a>
          </div>
        </form>
      </div>

      <!-- Reset Password Form -->
      <div id="reset-section" class="auth-form">
        <div style="text-align:center;margin-bottom:1.25rem">
          <div style="font-size:2.5rem;margin-bottom:0.5rem">🔑</div>
          <h3 style="margin-bottom:0.25rem">Reset Password</h3>
          <p class="text-muted" style="font-size:0.85rem">Enter the token and your new password.</p>
        </div>
        <form id="reset-form">
          <div class="form-group">
            <label class="form-label" for="reset-token">Reset Token</label>
            <input type="text" id="reset-token" class="form-input" placeholder="Paste your token here" required readonly style="font-size:0.75rem;color:var(--accent)">
          </div>
          <div class="form-group">
            <label class="form-label" for="reset-password">New Password</label>
            <input type="password" id="reset-password" class="form-input" placeholder="Min 6 characters" required minlength="6">
          </div>
          <div class="form-group">
            <label class="form-label" for="reset-password-confirm">Confirm New Password</label>
            <input type="password" id="reset-password-confirm" class="form-input" placeholder="Re-enter your password" required minlength="6">
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;">Reset Password</button>
          <div style="text-align:center;margin-top:1rem">
            <a href="#" id="back-to-login-2" style="font-size:0.85rem;color:var(--text-muted)">← Back to Sign In</a>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
